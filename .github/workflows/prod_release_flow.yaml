name: Create Release and Build Docker Image

on:
  push:
    branches: 
      - main
      - release

permissions:
  contents: write
  pull-requests: write


jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: semantic-release
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Required for full commit history
      - name: Python Semantic Release
        uses: python-semantic-release/python-semantic-release@master
        with:
          github_token: ${{ secrets.WORKFLOW_GITHUB_TOKEN }}

  build:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get latest release tag
        id: get_latest_release
        run: |
          latest_release=$(curl -s -H "Authorization: token ${{ secrets.WORKFLOW_GITHUB_TOKEN }}" \
            https://api.github.com/repos/wwmwabini/ispportal/releases/latest | \
            jq -r '.tag_name')
      
          echo "Latest release tag: $latest_release"
          echo "release_number=$latest_release" >> $GITHUB_OUTPUT
      
    
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN  }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          file: Dockerfile
          tags: wwmwabini/worship-event:${{ steps.get_latest_release.outputs.release_number }}-prod
          labels: ${{ steps.meta.outputs.labels }}


